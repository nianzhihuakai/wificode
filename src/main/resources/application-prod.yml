server:
  port: 7002
  servlet:
    context-path: /wificode

spring:
  application:
    name: wificode
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.nzhk.wificode

wificode:
  stats:
    bind-code-ttl-hours: 72
    report-rate-limit-per-minute: 30
    bind-attempts-per-day: 5
    bind-code-per-user-per-minute: 5
    bind-code-per-wifi-per-hour: 10
    wifi-code-write-per-user-per-minute: 5
  qrcode:
    storage-dir: /data/wificode/qrcode
  jwt:
    secret: ${wificode_JWT_SECRET}
  wechat:
    appid: ${wificode_WECHAT_APPID}
    secret: ${wificode_WECHAT_SECRET}
    check-path: true    # 生产环境校验 page 必须在已发布版本中存在
