# wificode 小程序码静态化（本地落盘 + nginx 提供 url）
#
# 假设：
# - 后端服务：127.0.0.1:7002（已设置 server.servlet.context-path=/wificode）
# - 小程序码落地目录：E:/data/wificode/qrcode
# - 后端生成并提供接口：GET /wificode/qrcode/miniprogram/{id}.png
#
# nginx 做法：
# 1) 先按文件系统尝试直接返回静态文件（url 形如 /wificode/qrcode/miniprogram/{id}.png）
# 2) 若文件不存在，则代理到后端接口生成并返回（后续请求将走静态文件）

location /wificode/qrcode/ {
    # alias 的用法：/wificode/qrcode/miniprogram/xxx.png -> E:/data/wificode/qrcode/miniprogram/xxx.png
    alias E:/data/wificode/qrcode/;

    # 如果磁盘已存在，则直接返回；否则代理到后端生成
    try_files $request_filename @wificode_qrcode_backend;

    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
}

location @wificode_qrcode_backend {
    # 代理保留原始 URI，后端会按 /wificode/qrcode/miniprogram/{id}.png 生成
    proxy_pass http://127.0.0.1:7002;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

